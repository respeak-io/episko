name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.4.2 && git push origin v0.4.2
# tauri-action builds the macOS (aarch64) bundle, signs the updater artifact with
# the minisign key, creates the GitHub Release, and uploads the .dmg, the
# .app.tar.gz(+.sig) updater artifact, and a latest.json the app's updater reads.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest # arm64 runner → aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Minisign key that signs the updater artifact; the app verifies against
          # the pubkey baked into tauri.conf.json. Set both as repo secrets.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Muster ${{ github.ref_name }}"
          # Install instructions are embedded in every release body so the
          # top-of-list (latest) release always carries them — GitHub can't pin
          # a release, so "always in the newest one" is the equivalent.
          releaseBody: |
            ## Install (macOS, Apple Silicon)

            1. Download **Muster_*_aarch64.dmg** from the assets below.
            2. Muster is self-signed (not notarized by Apple), so macOS Gatekeeper blocks the first launch. Clear the quarantine flag once:
               ```sh
               xattr -dr com.apple.quarantine ~/Downloads/Muster_*.dmg
               ```
            3. Open the `.dmg`, drag **Muster** into Applications, and launch it. If it's still blocked:
               ```sh
               xattr -dr com.apple.quarantine /Applications/Muster.app
               ```

            Requires `claude` on your `PATH`. Apple Silicon (M-series) only — Intel Macs aren't supported by this build. Muster keeps itself up to date after install (checks the latest release on launch; never auto-installs).
          releaseDraft: false
          prerelease: false
          # tauri-action generates and uploads latest.json when the updater is
          # configured; the app's endpoint points at the release's latest.json.
          args: --target aarch64-apple-darwin
